<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fake Photo Detector</title>
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <style>
        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
            max-width: 800px;
            width: 100%;
            padding: 30px;
        }
        h1 {
            font-weight: 700;
            font-size: 2rem;
            color: #f0f6fc;
            text-align: center;
            margin-bottom: 6px;
        }
        .subtitle {
            color: #8b949e;
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 24px;
        }
        .upload-area {
            border: 2px dashed #30363d;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: #0d1117;
        }
        .upload-area:hover {
            border-color: #58a6ff;
            background: #0d1117;
        }
        .upload-area i {
            font-size: 3rem;
            color: #58a6ff;
            margin-bottom: 10px;
        }
        .upload-area p {
            color: #8b949e;
            margin: 0;
        }
        #preview {
            max-width: 100%;
            max-height: 320px;
            border-radius: 12px;
            margin-top: 16px;
            display: none;
            border: 1px solid #30363d;
        }
        .camera-wrapper {
            position: relative;
            margin-top: 16px;
        }
        #video {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #30363d;
            background: #000;
        }
        .btn-camera {
            background: #238636;
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            transition: 0.2s;
            width: 100%;
        }
        .btn-camera:hover {
            background: #2ea043;
            color: #fff;
        }
        .btn-camera.active {
            background: #da3633;
        }
        .btn-camera.active:hover {
            background: #f85149;
        }
        .result-box {
            background: #0d1117;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #30363d;
            display: none;
        }
        .result-box .score {
            font-size: 3rem;
            font-weight: 700;
        }
        .result-box .label {
            font-size: 1.2rem;
            color: #8b949e;
        }
        .gauge {
            width: 100%;
            height: 10px;
            background: #21262d;
            border-radius: 10px;
            margin: 12px 0;
            overflow: hidden;
        }
        .gauge-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #238636, #da3633);
            border-radius: 10px;
            transition: width 0.4s ease;
        }
        .badge-screen {
            background: #da3633;
            color: #fff;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
        }
        .badge-real {
            background: #238636;
            color: #fff;
            padding: 6px 16px;
            border-radius: 30px;
            font-weight: 600;
        }
        .row.gap-3 {
            gap: 1rem;
        }
        @media (max-width: 576px) {
            .card { padding: 20px; }
            h1 { font-size: 1.6rem; }
            .result-box .score { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1><i class="bi bi-camera-fill" style="color:#58a6ff;"></i> Fake Photo Detector</h1>
    <p class="subtitle">Real photo vs. Screen / Printout recapture</p>

    <!-- Upload & Camera Row -->
    <div class="row g-3">
        <!-- Upload -->
        <div class="col-md-6">
            <div class="upload-area" id="uploadArea">
                <i class="bi bi-cloud-upload"></i>
                <p><strong>Click to upload</strong><br />or drag & drop</p>
                <input type="file" id="fileInput" accept="image/*" style="display:none;" />
            </div>
            <div id="filePreviewContainer" style="text-align:center;">
                <img id="preview" alt="Preview" />
            </div>
        </div>

        <!-- Camera -->
        <div class="col-md-6">
            <div class="camera-wrapper">
                <video id="video" autoplay playsinline></video>
                <button class="btn-camera mt-2" id="cameraBtn">
                    <i class="bi bi-camera-fill"></i> Start Camera
                </button>
            </div>
        </div>
    </div>

    <!-- Capture button (appears when camera is on) -->
    <div class="text-center mt-2" id="captureBtnWrapper" style="display:none;">
        <button class="btn btn-primary w-100" id="captureBtn">
            <i class="bi bi-snap"></i> Capture Photo
        </button>
    </div>

    <!-- Result -->
    <div class="result-box" id="resultBox">
        <div class="row align-items-center">
            <div class="col-4 text-center">
                <div class="score" id="scoreDisplay">0.00</div>
                <div class="label">Score</div>
            </div>
            <div class="col-8">
                <div><strong>Prediction</strong></div>
                <div id="predictionBadge" class="badge-screen" style="display:inline-block;">Loading...</div>
                <div class="gauge mt-2">
                    <div class="gauge-fill" id="gaugeFill"></div>
                </div>
                <small class="text-muted" id="confidenceText">Confidence: 0%</small>
            </div>
        </div>
    </div>

    <!-- Status / Error -->
    <div id="statusMsg" class="mt-3 text-center text-muted small"></div>
</div>

<script>
    // ---------- DOM refs ----------
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const video = document.getElementById('video');
    const cameraBtn = document.getElementById('cameraBtn');
    const captureBtnWrapper = document.getElementById('captureBtnWrapper');
    const captureBtn = document.getElementById('captureBtn');
    const resultBox = document.getElementById('resultBox');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const predictionBadge = document.getElementById('predictionBadge');
    const gaugeFill = document.getElementById('gaugeFill');
    const confidenceText = document.getElementById('confidenceText');
    const statusMsg = document.getElementById('statusMsg');

    let stream = null;
    let cameraActive = false;

    // ---------- Upload ----------
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.style.borderColor = '#58a6ff'; });
    uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = '#30363d'; });
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#30363d';
        if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
        if (!file.type.startsWith('image/')) {
            statusMsg.textContent = '❌ Please select an image file.';
            return;
        }
        statusMsg.textContent = '🔄 Analysing...';
        const reader = new FileReader();
        reader.onload = (e) => {
            preview.src = e.target.result;
            preview.style.display = 'block';
            sendImageToBackend(e.target.result);
        };
        reader.readAsDataURL(file);
    }

    // ---------- Camera ----------
    cameraBtn.addEventListener('click', async () => {
        if (cameraActive) {
            // Stop camera
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            video.srcObject = null;
            cameraActive = false;
            cameraBtn.innerHTML = '<i class="bi bi-camera-fill"></i> Start Camera';
            cameraBtn.classList.remove('active');
            captureBtnWrapper.style.display = 'none';
            return;
        }
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
            video.srcObject = stream;
            await video.play();
            cameraActive = true;
            cameraBtn.innerHTML = '<i class="bi bi-stop-fill"></i> Stop Camera';
            cameraBtn.classList.add('active');
            captureBtnWrapper.style.display = 'block';
            statusMsg.textContent = '📸 Camera ready. Tap "Capture Photo".';
        } catch (err) {
            statusMsg.textContent = '❌ Camera access denied: ' + err.message;
        }
    });

    captureBtn.addEventListener('click', () => {
        if (!cameraActive) return;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
        preview.src = dataUrl;
        preview.style.display = 'block';
        sendImageToBackend(dataUrl);
    });

    // ---------- Backend API call ----------
    async function sendImageToBackend(imageData) {
        // If it's a data URL, extract base64
        let payload;
        if (imageData.startsWith('data:image')) {
            payload = JSON.stringify({ image: imageData });
            const res = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: payload
            });
            handleResponse(res);
        } else {
            // File upload path (fallback)
            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            const res = await fetch('/predict', {
                method: 'POST',
                body: formData
            });
            handleResponse(res);
        }
    }

    async function handleResponse(response) {
        const data = await response.json();
        if (data.error) {
            statusMsg.textContent = '❌ Error: ' + data.error;
            return;
        }
        const score = data.score;
        const prediction = data.prediction;
        const confidence = data.confidence;

        // Update UI
        resultBox.style.display = 'block';
        scoreDisplay.textContent = score.toFixed(4);
        gaugeFill.style.width = (score * 100) + '%';

        if (prediction === 'screen') {
            predictionBadge.textContent = '📱 PHOTO OF SCREEN';
            predictionBadge.className = 'badge-screen';
        } else {
            predictionBadge.textContent = '🌿 REAL PHOTO';
            predictionBadge.className = 'badge-real';
        }
        confidenceText.textContent = `Confidence: ${(confidence * 100).toFixed(1)}%`;
        statusMsg.textContent = '✅ Analysis complete.';
    }
</script>
</body>
</html>
